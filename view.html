<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
margin:0;
font-family:sans-serif;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div id="views">
👁️ Đang tải...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDiItFPRUuc0m9RajJEDZKmbLZAtQwuGDQ",
    authDomain: "notioncountview.firebaseapp.com",
    projectId: "notioncountview",
    storageBucket: "notioncountview.firebasestorage.app",
    messagingSenderId: "533486500231",
    appId: "1:533486500231:web:129f2dc25dc8cc7a4fbb22"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);

const chapter =
params.get("chapter") || "unknown";

const ref =
doc(db,"views",chapter);

const snap =
await getDoc(ref);

let count = 1;

if(snap.exists()){
count = snap.data().count + 1;
}

await setDoc(ref,{
count
});

document.getElementById("views")
.innerHTML =
`👁️ ${count} lượt xem`;

</script>

</body>
</html>
