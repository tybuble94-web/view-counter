<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test Firebase</title>
</head>

<body>

<div id="views">
Đang kiểm tra Firebase...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiItFPRUuc0m9RajJEDZKmbLZAtQwuGDQ",
  authDomain: "notioncountview.firebaseapp.com",
  projectId: "notioncountview",
  storageBucket: "notioncountview.firebasestorage.app",
  messagingSenderId: "533486500231",
  appId: "1:533486500231:web:129f2dc25dc8cc7a4fbb22"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

try {

  const ref = doc(db, "test", "ping");

  await setDoc(ref, {
    ok: true
  });

  const snap = await getDoc(ref);

  document.getElementById("views").innerHTML =
    "✅ Firebase hoạt động";

  console.log("Firestore OK:", snap.data());

}
catch(error){

  document.getElementById("views").innerHTML =
    "❌ Lỗi: " + error.message;

  console.error(error);

}

</script>

</body>
</html>
